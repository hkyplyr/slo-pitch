services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: slo_pitch_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d slo_pitch_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      MIX_ENV: dev
      PORT: 4000
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_NAME: slo_pitch_dev
    ports:
      - "4000:4000"
    volumes:
      - .:/app
      - mix_deps:/app/deps
      - mix_build:/app/_build
    command: >
      sh -c "
      mix deps.get &&
      mix ecto.create &&
      mix ecto.migrate &&
      mix phx.server
      "

volumes:
  postgres_data:
  mix_deps:
  mix_build:
